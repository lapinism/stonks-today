<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stonks Today - 포트폴리오 수정</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-container, .portfolio-container {
            width: 90%;
            max-width: 800px;
            margin: 1rem auto;
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .portfolio-item {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }
        .portfolio-item:last-child {
            border-bottom: none;
        }
        .portfolio-item .form-group {
            flex: 1 1 120px;
            margin-bottom: 0;
        }
        .btn-group {
            display: flex;
            gap: 0.5rem;
        }
        .btn-update, .btn-delete {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        .btn-update { background-color: #3498db; }
        .btn-delete { background-color: #e74c3c; }
        .back-btn {
            margin: 1rem auto;
            text-decoration: none;
            color: var(--text-color);
            font-weight: bold;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background-color: #eee;
            transition: background 0.3s;
            display: block;
            width: fit-content;
        }
        .back-btn:hover { background-color: #ddd; }
        h2 {
            margin-top: 0;
            border-bottom: 2px solid #eee;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <main style="flex-direction: column;">
        <h1 id="page-title">포트폴리오 수정</h1>
        
        <!-- 포트폴리오 수정 섹션 -->
        <section id="portfolio-list" class="portfolio-container">
            <h2>보유 종목 수정</h2>
            <div id="items-container"></div>
        </section>

        <!-- 종목 추가 섹션 -->
        <section class="admin-container">
            <h2>새 종목 추가</h2>
            <form id="add-item-form">
                <div class="form-group">
                    <label for="ticker">종목명 (Ticker)</label>
                    <input type="text" id="ticker" name="ticker" placeholder="e.g., AAPL, 005930" required>
                </div>
                <div class="form-group">
                    <label for="quantity">수량</label>
                    <input type="number" id="quantity" name="quantity" placeholder="10" step="any" required>
                </div>
                <div class="form-group">
                    <label for="price">1주당 평균 가격 (KRW)</label>
                    <input type="number" id="price" name="price" placeholder="150000" step="any" required>
                </div>
                <button type="submit" class="btn-submit">종목 추가</button>
            </form>
        </section>

        <a id="back-link" href="/" class="back-btn">← 뒤로가기</a>
    </main>
    <footer>
        Built with ❤️ by <a href="https://github.com/lapinism">@lapinism</a>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // URL에서 username 추출 (예: /edit/yoon -> yoon)
            const pathParts = window.location.pathname.split('/');
            const username = pathParts[pathParts.length - 2];

            document.getElementById('page-title').textContent = `${username}님의 포트폴리오 수정`;
            document.title = `Stonks Today - ${username} 포트폴리오 수정`;
            document.getElementById('back-link').href = `/${username}`; // 상세 페이지로 돌아가기

            const itemsContainer = document.getElementById('items-container');

            const renderPortfolio = (portfolio) => {
                itemsContainer.innerHTML = ''; // 기존 목록 초기화
                if (!portfolio || portfolio.length === 0) {
                    itemsContainer.innerHTML = '<p>포트폴리오에 종목이 없습니다. 새 종목을 추가해보세요.</p>';
                    return;
                }

                portfolio.forEach(item => {
                    const form = document.createElement('form');
                    form.classList.add('portfolio-item');
                    form.dataset.id = item.id;

                    form.innerHTML = `
                        <div class="form-group">
                            <label for="ticker-${item.id}">종목명</label>
                            <input type="text" id="ticker-${item.id}" name="ticker" value="${item.ticker}" required readonly>
                        </div>
                        <div class="form-group">
                            <label for="quantity-${item.id}">수량</label>
                            <input type="number" id="quantity-${item.id}" name="quantity" value="${item.quantity}" step="any" required>
                        </div>
                        <div class="form-group">
                            <label for="price-${item.id}">1주당 평균 가격 (KRW)</label>
                            <input type="number" id="price-${item.id}" name="price" value="${item.price}" step="any" required>
                        </div>
                        <div class="btn-group">
                            <button type="submit" class="btn-update">수정</button>
                            <button type="button" class="btn-delete">삭제</button>
                        </div>
                    `;
                    itemsContainer.appendChild(form);

                    // 수정 이벤트 리스너
                    form.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const formData = new FormData(form);
                        const data = {
                            quantity: formData.get('quantity'),
                            price: formData.get('price')
                        };
                        // 여기에 수정 API 호출 (PATCH /api/portfolios/:id)
                        console.log('Update item:', item.id, data);
                        alert(`[미구현] ID ${item.id} 항목을 수정합니다.`);
                    });

                    // 삭제 이벤트 리스너
                    form.querySelector('.btn-delete').addEventListener('click', async () => {
                        if (confirm(`'${item.ticker}' 종목을 삭제하시겠습니까?`)) {
                            // 여기에 삭제 API 호출 (DELETE /api/portfolios/:id)
                            console.log('Delete item:', item.id);
                            alert(`[미구현] ID ${item.id} 항목을 삭제합니다.`);
                        }
                    });
                });
            };

            const fetchPortfolio = async () => {
                try {
                    const response = await fetch(`/api/portfolios/${username}`);
                    if (!response.ok) throw new Error('포트폴리오 정보를 가져오는 데 실패했습니다.');
                    const portfolioData = await response.json();
                    renderPortfolio(portfolioData);
                } catch (error) {
                    console.error(error);
                    itemsContainer.innerHTML = `<p style="text-align:center; color: red;">${error.message}</p>`;
                }
            };
            
            // 새 종목 추가 폼 처리
            const addItemForm = document.getElementById('add-item-form');
            addItemForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(addItemForm);
                const data = {
                    username: username,
                    ticker: formData.get('ticker'),
                    quantity: formData.get('quantity'),
                    price: formData.get('price')
                };
                
                // 여기에 종목 추가 API 호출 (POST /api/portfolios)
                console.log('Add new item:', data);
                alert(`[미구현] 새 종목 '${data.ticker}'을(를) 추가합니다.`);
                // 성공 후 폼 초기화 및 목록 새로고침
                // addItemForm.reset();
                // fetchPortfolio();
            });

            // 초기 포트폴리오 로드
            fetchPortfolio();
        });
    </script>
</body>
</html>
